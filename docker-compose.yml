services:

  postgres:
    image: postgres:16
    container_name: igovern-postgres
    environment:
      POSTGRES_DB: igovern_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  activemq:
    image: apache/activemq-classic:latest
    container_name: igovern-activemq
    ports:
      - "61616:61616"
      - "8161:8161"

  program-service:
    build:
      context: ./program-service
    container_name: program-service
    depends_on:
      - postgres
      - activemq
    ports:
      - "8081:8081"

  audit-service:
    build:
      context: ./audit-service
    container_name: audit-service
    depends_on:
      - postgres
      - activemq
    ports:
      - "8082:8082"

  igovern-ui:
    build:
      context: ./igovern-ui
    container_name: igovern-ui
    depends_on:
      - program-service
      - audit-service
    ports:
      - "4200:80"

volumes:
  postgres-data: