server:
  port: 8081

spring:
  application:
    name: program-service

  security:
    user:
      name: admin
      password: admin123
      
  datasource:
    url: jdbc:postgresql://localhost:5432/igovern_db?currentSchema=program_schema
    username: postgres
    password: admin
    driver-class-name: org.postgresql.Driver

  activemq:
    broker-url: tcp://localhost:61616
    user: admin
    password: admin

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        default_schema: program_schema

  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 5MB

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

  endpoint:
    health:
      show-details: always

  health:
    jms:
      enabled: false

logging:
  config: classpath:log4j2.xml
  level:
    org.springframework: INFO
    org.hibernate.SQL: DEBUG

file:
  upload-dir: uploads