server:
  port: 8082

spring:
  application:
    name: audit-service
    
  security:
    user:
      name: admin
      password: admin123

  datasource:
    url: jdbc:postgresql://localhost:5432/igovern_db?currentSchema=audit_schema
    username: postgres
    password: admin
    driver-class-name: org.postgresql.Driver

  activemq:
    broker-url: tcp://localhost:61616
    user: admin
    password: admin

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        default_schema: audit_schema

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

  endpoint:
    health:
      show-details: always

logging:
  config: classpath:log4j2.xml
  level:
    org.springframework: INFO
    org.hibernate.SQL: DEBUG